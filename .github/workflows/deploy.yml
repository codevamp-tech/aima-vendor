name: Deploy AIMA Vendor Portal

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, aima]
    steps:
      - name: Pull latest code
        shell: powershell
        run: |
          git config --global --add safe.directory D:/html/users/userweb8/Html/account/aima-vendor
          cd D:\html\users\userweb8\Html\account\aima-vendor
          git pull origin master

      - name: Install dependencies
        shell: powershell
        run: |
          cd D:\html\users\userweb8\Html\account\aima-vendor
          npm install

      - name: Build project
        shell: powershell
        run: |
          cd D:\html\users\userweb8\Html\account\aima-vendor
          npm run build

      - name: Restart PM2 service
        shell: cmd
        run: |
          cd /d D:\html\users\userweb8\Html\account\aima-vendor
          npx pm2 describe vendor-portal >nul 2>&1 && npx pm2 restart vendor-portal || npx pm2 start start.js --name vendor-portal

      - name: Run Diagnostics
        shell: powershell
        run: |
          Write-Host "=== PM2 Status ==="
          npx pm2 list
          
          Write-Host "=== PM2 Error Logs (Last 50 lines) ==="
          $errPath = "C:\Users\aima_usr\.pm2\logs\vendor-portal-error.log"
          if (Test-Path $errPath) {
              Get-Content -Path $errPath -Tail 50
          } else {
              Write-Host "No error log found at $errPath"
          }
          
          Write-Host "=== PM2 Out Logs (Last 50 lines) ==="
          $outPath = "C:\Users\aima_usr\.pm2\logs\vendor-portal-out.log"
          if (Test-Path $outPath) {
              Get-Content -Path $outPath -Tail 50
          } else {
              Write-Host "No out log found at $outPath"
          }

          Write-Host "=== Process Listening on Port 3000 ==="
          $connection = Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue
          if ($connection) {
              $pidVal = $connection[0].OwningProcess
              Write-Host "PID listening on port 3000: $pidVal"
              Get-Process -Id $pidVal | Format-List Path, Name, Id
          } else {
              Write-Host "No process found listening on port 3000"
          }

          Write-Host "=== HTTP Test (localhost:3000/account) ==="
          try {
              $resp = Invoke-WebRequest -Uri "http://localhost:3000/account" -UseBasicParsing -TimeoutSec 10
              Write-Host "Status Code: $($resp.StatusCode)"
              Write-Host "Response preview: $($resp.Content.Substring(0, [Math]::Min(200, $resp.Content.Length)))"
          } catch {
              Write-Host "Failed to request http://localhost:3000/account"
              Write-Host $_.Exception.Message
          }

          Write-Host "=== HTTP Test (localhost:3000/account/admin/login) ==="
          try {
              $resp = Invoke-WebRequest -Uri "http://localhost:3000/account/admin/login" -UseBasicParsing -TimeoutSec 10
              Write-Host "Status Code: $($resp.StatusCode)"
              Write-Host "Response preview: $($resp.Content.Substring(0, [Math]::Min(200, $resp.Content.Length)))"
          } catch {
              Write-Host "Failed to request http://localhost:3000/account/admin/login"
              Write-Host $_.Exception.Message
          }
