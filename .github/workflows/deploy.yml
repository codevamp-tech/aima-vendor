name: Deploy AIMA Vendor Portal

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, aima]
    steps:
      - name: Pull latest code
        shell: powershell
        run: |
          git config --global --add safe.directory D:/html/users/userweb8/Html/account/aima-vendor
          cd D:\html\users\userweb8\Html\account\aima-vendor
          git pull origin master

      - name: Install dependencies
        shell: powershell
        run: |
          cd D:\html\users\userweb8\Html\account\aima-vendor
          npm install

      - name: Build project
        shell: powershell
        run: |
          cd D:\html\users\userweb8\Html\account\aima-vendor
          npm run build

      - name: Restart PM2 service
        shell: powershell
        run: |
          cd D:\html\users\userweb8\Html\account\aima-vendor
          $null = npx pm2 describe vendor-portal 2>$null
          if ($LASTEXITCODE -eq 0) {
              npx pm2 restart vendor-portal
          } else {
              npx pm2 start start.js --name vendor-portal
          }
